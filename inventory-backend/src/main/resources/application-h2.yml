# ============================================================
# H2 数据库配置 (用于开发测试)
# ============================================================

spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:inventory_v2;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:

  # H2 控制台配置
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  # 初始化数据库
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      data-locations: classpath:data-h2.sql
      encoding: UTF-8
